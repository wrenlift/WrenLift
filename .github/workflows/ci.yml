name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown, wasm32-wasip1

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --all-targets

      - name: Unit tests
        run: cargo test --release --lib

      - name: E2E tests
        run: cargo test --release --test e2e

      - name: Clippy (host)
        run: cargo clippy --all-targets -- -D warnings

      # Same lint bar for the wasm runtime build. The library has
      # large chunks gated to `feature = "host"` (JIT, plugin
      # loader, hatch packaging) — a crate-level `allow(dead_code,
      # unused_imports, unused_variables, unreachable_patterns)`
      # under `cfg(not(feature = "host"))` keeps the gated paths
      # from drowning real warnings in the rest.
      - name: Clippy (wasm32-unknown-unknown)
        run: |
          cargo clippy --lib --target wasm32-unknown-unknown \
            --no-default-features -- -D warnings
          cargo clippy -p wlift_wasm --target wasm32-unknown-unknown \
            -- -D warnings

      - name: Wasm smoke test
        # Builds `wlift_wasm`'s `smoke` binary for `wasm32-wasip1`,
        # runs it via the embedded `wasmtime` crate, and asserts
        # the captured Wren output. Catches the kind of wasm
        # regression `cargo clippy` doesn't see (panicking
        # `Instant::now`, missing trampolines, runtime UB).
        run: cargo test --release --test wasm_smoke -- --nocapture

      - name: Format check
        run: cargo fmt -- --check
