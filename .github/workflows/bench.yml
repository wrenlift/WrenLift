name: Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-bench-

      - name: Install interpreters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq luajit ruby

      - name: Build standard Wren
        run: |
          git clone --depth 1 https://github.com/wren-lang/wren-cli.git /tmp/wren-cli
          cd /tmp/wren-cli
          make -C projects/make -j$(nproc)
          sudo cp bin/wren_cli /usr/local/bin/wren_cli

      - name: Build release
        run: cargo build --release

      - name: Run benchmarks
        run: |
          WLIFT="./target/release/wlift"
          RUNS=10

          # Helper: run a command N times, extract best "elapsed: X" time
          best_of() {
            local best=""
            for i in $(seq 1 $RUNS); do
              local output exit_code
              output=$("$@" 2>&1) && exit_code=$? || exit_code=$?
              if [ $exit_code -ne 0 ] && [ $i -eq 1 ]; then
                echo "  [debug] exit=$exit_code for: $*" >&2
                echo "  [debug] output: $(echo "$output" | tail -3)" >&2
              fi
              local t
              t=$(echo "$output" | grep -oE 'elapsed: [0-9]+\.?[0-9]*' | tail -1 | awk '{print $2}')
              if [ -n "$t" ]; then
                if [ -z "$best" ] || [ "$(echo "$t < $best" | bc -l)" = "1" ]; then
                  best="$t"
                fi
              fi
            done
            echo "$best"
          }

          BENCHMARKS="fib method_call binary_trees"
          RESULTS="{}"

          for bench in $BENCHMARKS; do
            BENCH_RESULTS="{}"

            # WrenLift
            t=$(best_of $WLIFT "bench/${bench}.wren")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {wrenlift: ($v | tonumber)}')
            else
              echo "  [wrenlift] FAILED for $bench"
            fi

            # Standard Wren
            t=$(best_of wren_cli "bench/${bench}.wren")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {wren: ($v | tonumber)}')
            fi

            # Python3
            t=$(best_of python3 "bench/lang/${bench}.py")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {python3: ($v | tonumber)}')
            fi

            # Ruby
            t=$(best_of ruby "bench/lang/${bench}.rb")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {ruby: ($v | tonumber)}')
            fi

            # LuaJIT (JIT enabled)
            t=$(best_of luajit "bench/lang/${bench}.lua")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {"luajit": ($v | tonumber)}')
            fi

            # LuaJIT (-joff = interpreter only)
            t=$(best_of luajit -joff "bench/lang/${bench}.lua")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {"luajit (-joff)": ($v | tonumber)}')
            fi

            RESULTS=$(echo "$RESULTS" | jq --arg k "$bench" --argjson v "$BENCH_RESULTS" '. + {($k): $v}')
          done

          # Add metadata
          RESULTS=$(echo "$RESULTS" | jq \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sha "${{ github.sha }}" \
            --arg ref "${{ github.ref_name }}" \
            --arg runner "$(uname -m)" \
            '. + {meta: {date: $date, commit: $sha, branch: $ref, arch: $runner, runs: 10}}')

          echo "$RESULTS" | jq .
          echo "$RESULTS" > bench/site/results.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bench/site

  deploy:
    needs: benchmark
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
