name: Benchmarks + site deploy

# Two jobs: `benchmark` runs the timing matrix and writes
# `site/benchmark/results.json`; `deploy` then publishes the
# whole `site/` (landing + benchmark page + assets) to GitHub
# Pages. The wrenlift landing lives at `/`, benchmark results
# at `/benchmark/`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-bench-

      - name: Install interpreters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq luajit ruby

      - name: Build standard Wren
        run: |
          git clone --depth 1 https://github.com/wren-lang/wren-cli.git /tmp/wren-cli
          cd /tmp/wren-cli
          make -C projects/make -j$(nproc)
          sudo cp bin/wren_cli /usr/local/bin/wren_cli

      - name: Build release
        run: cargo build --release

      - name: Verify bench correctness vs standard Wren
        # Sanity gate before the timing run. For each Wren bench, run
        # it once on both wlift and wren_cli, strip the `elapsed:` line,
        # and diff stdouts. Any mismatch fails the workflow — that's
        # the protection against a silent miscompile that would
        # otherwise post as a speedup.
        #
        # stderr is captured separately (wlift may print JIT compile-
        # diagnostic noise there) and shown alongside the diff when we
        # fail, but doesn't participate in the comparison.
        run: |
          WLIFT="./target/release/wlift"
          BENCHMARKS="fib method_call binary_trees delta_blue"
          fail=0
          for bench in $BENCHMARKS; do
            echo "::group::$bench correctness"
            wl=$(timeout 60 "$WLIFT" "bench/${bench}.wren" 2>/tmp/wl.err | grep -v '^elapsed:' || true)
            wr=$(timeout 60 wren_cli "bench/${bench}.wren" 2>/tmp/wr.err | grep -v '^elapsed:' || true)
            if [ "$wl" != "$wr" ]; then
              echo "::error title=$bench::wrenlift output differs from wren_cli"
              echo "--- wrenlift stdout ---"
              echo "$wl"
              echo "--- wren_cli stdout ---"
              echo "$wr"
              echo "--- diff ---"
              diff <(echo "$wl") <(echo "$wr") || true
              if [ -s /tmp/wl.err ]; then
                echo "--- wrenlift stderr ---"
                cat /tmp/wl.err
              fi
              fail=1
            else
              lines=$(echo "$wl" | wc -l | tr -d ' ')
              echo "$bench: match ($lines lines)"
            fi
            echo "::endgroup::"
          done
          if [ "$fail" != "0" ]; then
            echo "::error::bench correctness gate failed — see per-bench diffs above"
            exit 1
          fi

      - name: Run benchmarks
        # WLIFT defaults that matter for these numbers:
        # - --mode Tiered (interpret → JIT with OSR)
        # - Threaded interpreter dispatch ON (no WLIFT_DISABLE_THREADED)
        # - Method / nested-caller OSR ON (no WLIFT_DISABLE_METHOD_OSR /
        #   WLIFT_DISABLE_NESTED_OSR)
        # Keep these kill switches unset so the bench reflects the release
        # configuration.
        run: |
          WLIFT="./target/release/wlift"
          RUNS=10

          # Helper: run a command N times, extract best "elapsed: X" time
          best_of() {
            local best=""
            for i in $(seq 1 $RUNS); do
              local output exit_code
              output=$(timeout 60 "$@" 2>&1) && exit_code=$? || exit_code=$?
              if [ $exit_code -ne 0 ] && [ $i -eq 1 ]; then
                echo "  [debug] exit=$exit_code for: $*" >&2
                echo "  [debug] output: $(echo "$output" | tail -3)" >&2
              fi
              local t
              t=$(echo "$output" | grep -oE 'elapsed: [0-9]+\.?[0-9]*' | tail -1 | awk '{print $2}')
              if [ -n "$t" ]; then
                if [ -z "$best" ] || [ "$(echo "$t < $best" | bc -l)" = "1" ]; then
                  best="$t"
                fi
              fi
            done
            echo "$best"
          }

          BENCHMARKS="fib method_call binary_trees delta_blue"
          RESULTS="{}"

          for bench in $BENCHMARKS; do
            BENCH_RESULTS="{}"

            # WrenLift
            t=$(best_of $WLIFT "bench/${bench}.wren")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {wrenlift: ($v | tonumber)}')
            else
              echo "  [wrenlift] FAILED for $bench"
            fi

            # Standard Wren
            t=$(best_of wren_cli "bench/${bench}.wren")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {wren: ($v | tonumber)}')
            fi

            # Python3
            t=$(best_of python3 "bench/lang/${bench}.py")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {python3: ($v | tonumber)}')
            fi

            # Ruby
            t=$(best_of ruby "bench/lang/${bench}.rb")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {ruby: ($v | tonumber)}')
            fi

            # LuaJIT (JIT enabled)
            t=$(best_of luajit "bench/lang/${bench}.lua")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {"luajit": ($v | tonumber)}')
            fi

            # LuaJIT (-joff = interpreter only)
            t=$(best_of luajit -joff "bench/lang/${bench}.lua")
            if [ -n "$t" ]; then
              BENCH_RESULTS=$(echo "$BENCH_RESULTS" | jq --arg v "$t" '. + {"luajit (-joff)": ($v | tonumber)}')
            fi

            RESULTS=$(echo "$RESULTS" | jq --arg k "$bench" --argjson v "$BENCH_RESULTS" '. + {($k): $v}')
          done

          # Add metadata
          RESULTS=$(echo "$RESULTS" | jq \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sha "${{ github.sha }}" \
            --arg ref "${{ github.ref_name }}" \
            --arg runner "$(uname -m)" \
            --argjson runs "$RUNS" \
            '. + {meta: {date: $date, commit: $sha, branch: $ref, arch: $runner, runs: $runs}}')

          echo "$RESULTS" | jq .
          mkdir -p site/benchmark
          echo "$RESULTS" > site/benchmark/results.json

      - name: Install wasm-pack
        # `wasm-pack` produces the `wasm/pkg/` bundle the
        # playground imports. Cargo-installable so we don't need
        # the upstream curl-bash installer in CI.
        run: cargo install wasm-pack --locked

      - name: Build the wasm playground
        # `--no-typescript` matches `wasm/README.md` — the
        # playground's JS imports the .js shim directly, no .d.ts
        # consumers in the deploy.
        run: wasm-pack build wasm --target web --release --no-typescript

      - name: Stage playground into site/
        # Layout the playground expects: `playground/web/` +
        # sibling `playground/pkg/`. wlift.js / worker.js import
        # `../pkg/wlift_wasm.js`, which resolves cleanly with
        # this shape. The "Try it in your browser" CTA on the
        # landing points at `playground/web/`.
        #
        # `HATCH_BOT_URL` (configured as a repo variable) is
        # injected as `window.WLIFT_PROXY_BASE` so the playground's
        # dep fetcher routes registry calls through the Edge
        # Function's `/proxy` endpoint instead of the local
        # serve.js. Falls through silently if the var is unset —
        # the playground only needs the proxy when a hatchfile
        # declares scoped deps, and surfaces an actionable error
        # at runtime if the fetch fails.
        env:
          HATCH_BOT_URL: ${{ vars.HATCH_BOT_URL }}
        run: |
          set -eu
          mkdir -p site/playground/web site/playground/pkg
          cp -R wasm/web/. site/playground/web/
          cp -R wasm/pkg/. site/playground/pkg/
          if [ -n "${HATCH_BOT_URL:-}" ]; then
            # Inject `window.WLIFT_PROXY_BASE` right after <head>
            # so the page-script picks it up before the playground
            # boots. Escape `&`, `/`, and `$` to keep sed happy
            # against arbitrary URL contents.
            esc=$(printf '%s' "$HATCH_BOT_URL" | sed -e 's/[\/&$]/\\&/g')
            sed -i'' -e "s|<head>|<head>\n  <script>window.WLIFT_PROXY_BASE=\"${esc}\";</script>|" \
              site/playground/web/index.html
            echo "::notice::injected WLIFT_PROXY_BASE = ${HATCH_BOT_URL}"
          else
            echo "::notice::HATCH_BOT_URL var unset; playground will use relative /proxy (no remote registry fetches)"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: benchmark
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
