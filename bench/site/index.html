<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WrenLift Benchmarks</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --bar-wlift: #2563eb;
    --bar-other: #7bafd4;
    --border: #e5e7eb;
    --card-bg: #f9fafb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --bar-wlift: #3b82f6;
      --bar-other: #5883a7;
      --border: #1e293b;
      --card-bg: #1e293b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 2rem 1rem;
    max-width: 800px;
    margin: 0 auto;
  }
  h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 2.5rem;
  }
  .subtitle a { color: var(--bar-wlift); text-decoration: none; }
  .subtitle a:hover { text-decoration: underline; }
  .section-title {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--bar-wlift);
    margin-bottom: 1rem;
    margin-top: 2.5rem;
  }
  .chart {
    margin-bottom: 2rem;
  }
  .bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 0.5rem;
    height: 2rem;
  }
  .bar-label {
    width: 130px;
    font-weight: 600;
    font-size: 0.9rem;
    flex-shrink: 0;
    text-align: right;
    padding-right: 12px;
  }
  .bar-track {
    flex: 1;
    position: relative;
    height: 100%;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    position: relative;
    min-width: 2px;
    transition: width 0.6s ease-out;
  }
  .bar-fill.wrenlift {
    background: var(--bar-wlift);
  }
  .bar-fill.other {
    background: var(--bar-other);
  }
  .bar-time {
    position: absolute;
    right: -4px;
    top: 50%;
    transform: translate(100%, -50%);
    font-size: 0.8rem;
    font-weight: 600;
    font-style: italic;
    padding-left: 6px;
    white-space: nowrap;
    color: var(--text);
  }
  .footnote {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--muted);
  }
  .footnote strong { color: var(--text); }
  .meta {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .meta code {
    background: var(--card-bg);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.78rem;
  }
  .loading {
    color: var(--muted);
    font-style: italic;
    margin: 2rem 0;
  }
</style>
</head>
<body>

<h1>Performance</h1>
<p class="subtitle">
  <a href="https://github.com/wrenlift/WrenLift">WrenLift</a> benchmarks
  compared against other scripting language interpreters.
  All results from the same CI machine.
</p>

<div id="charts"><p class="loading">Loading benchmark results...</p></div>
<div id="meta"></div>

<script>
const CHART_TITLES = {
  method_call: "Method Call",
  fib: "Recursive Fibonacci",
  binary_trees: "Binary Trees",
  delta_blue: "DeltaBlue",
};

const BENCH_ORDER = ["method_call", "binary_trees", "fib", "delta_blue"];

function buildChart(name, data) {
  const title = CHART_TITLES[name] || name;

  // Build sorted entries
  let entries = [];
  for (const [lang, time] of Object.entries(data)) {
    entries.push({ name: lang, time: time });
  }
  entries.sort((a, b) => a.time - b.time);

  const maxTime = Math.max(...entries.map(e => e.time));

  let html = `<h2 class="section-title">${title}</h2><div class="chart">`;
  entries.forEach(e => {
    const pct = (e.time / maxTime) * 75; // max bar = 75% of track width
    const cls = e.name === "wrenlift" ? "wrenlift" : "other";
    const label = e.name === "wrenlift" ? `<strong>${e.name}</strong>` : e.name;
    html += `
      <div class="bar-row">
        <div class="bar-label">${label}</div>
        <div class="bar-track">
          <div class="bar-fill ${cls}" style="width: ${pct}%">
            <span class="bar-time">${e.time.toFixed(2)}s</span>
          </div>
        </div>
      </div>`;
  });
  html += `</div>`;
  return html;
}

async function main() {
  const container = document.getElementById("charts");
  const metaEl = document.getElementById("meta");

  let results = {};
  try {
    const resp = await fetch("results.json");
    if (resp.ok) {
      results = await resp.json();
    }
  } catch (e) {
    container.innerHTML = `<p class="loading">Failed to load results. Run the benchmark workflow first.</p>`;
    return;
  }

  if (!results || Object.keys(results).length === 0) {
    container.innerHTML = `<p class="loading">No results available yet. Run the benchmark workflow first.</p>`;
    return;
  }

  let html = "";
  BENCH_ORDER.forEach(name => {
    if (results[name] && typeof results[name] === "object") {
      html += buildChart(name, results[name]);
    }
  });

  html += `
    <div class="footnote">
      <strong>Shorter bars are better.</strong>
      Each benchmark is run 10 times and the best time is kept.
      It only measures the time taken to execute the benchmarked code itself, not interpreter startup.
      All results are from the same GitHub Actions runner for a fair comparison.
    </div>`;

  container.innerHTML = html;

  // Metadata
  if (results.meta) {
    const m = results.meta;
    const sha = m.commit ? m.commit.substring(0, 7) : "\u2014";
    metaEl.innerHTML = `
      <div class="meta">
        Last updated: ${m.date || "\u2014"} &middot;
        Commit: <code>${sha}</code> &middot;
        Arch: ${m.arch || "\u2014"} &middot;
        Best of ${m.runs || 10} runs
      </div>`;
  }
}

main();
</script>
</body>
</html>
