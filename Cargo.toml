[package]
name = "wren_lift"
version = "0.1.0"
authors = ["Damilare Akinlaja <damilare@zenturi.co>"]
edition = "2021"

[lib]
crate-type = ["lib", "cdylib", "staticlib"]

[[bin]]
name = "wlift"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
ariadne = "0.5"
logos = "0.15"
dynasmrt = "2"
dynasm = "2"
wasm-encoder = "0.245"

[dev-dependencies]
capstone = "0.12"
wasmtime = "31"
wasmprinter = "0.226"
wasmparser = "0.226"
